<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Chat | Clasna Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">
    <aside class="w-64 bg-indigo-800 text-white flex flex-col z-10">
        <div class="p-6 text-2xl font-bold border-b border-indigo-700">Clasna Tech</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="block p-3 hover:bg-indigo-700 rounded-lg">📊 Əsas Panel</a>
            <a href="expenses.html" class="block p-3 hover:bg-indigo-700 rounded-lg">💰 Xərclər</a>
            <a href="chat.html" class="block p-3 bg-indigo-700 rounded-lg">💬 Partnyor Chat</a>
        </nav>
    </aside>

    <main class="flex-1 flex bg-white m-4 rounded-xl shadow overflow-hidden">
        
        <div class="w-1/3 border-r border-gray-200 flex flex-col bg-gray-50">
            <div class="p-4 border-b border-gray-200 bg-white font-bold text-gray-700">Partnyorlar</div>
            <div id="partnerList" class="flex-1 overflow-y-auto">
                </div>
        </div>

        <div class="w-2/3 flex flex-col bg-white">
            <div class="p-4 border-b border-gray-200 bg-white font-bold text-indigo-600" id="chatHeader">
                Partnyor seçin
            </div>
            
            <div id="chatBox" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-50">
                <div class="text-center text-gray-400 text-sm mt-10">Söhbətə başlamaq üçün soldan partnyor seçin.</div>
            </div>

            <div class="p-4 bg-white border-t border-gray-200 flex gap-3 pointer-events-none opacity-50" id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Mesaj yazın..." class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="sendMsgBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 font-medium">Göndər</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
