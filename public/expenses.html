<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xərclər | Clasna Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Scrollbar-ı gizlətmək üçün xüsusi CSS */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans text-gray-800">
    
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl z-20 shrink-0">
        <div class="p-6 text-2xl font-black tracking-wider border-b border-slate-800 flex items-center gap-3">
            <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white">C</div>
            Clasna
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <a href="index.html" class="flex items-center gap-3 p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl font-medium transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Əsas Panel
            </a>
            <a href="jobs.html" class="flex items-center gap-3 p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl font-medium transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                İşlər (Sifarişlər)
            </a>
            <a href="expenses.html" class="flex items-center gap-3 p-3 bg-indigo-600 shadow-lg shadow-indigo-600/30 rounded-xl font-medium transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Xərclər
            </a>
            <a href="chat.html" class="flex items-center gap-3 p-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl font-medium transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                Partnyor Chat
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto bg-slate-50 p-8 no-scrollbar">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-800">Xərclər İdarəetməsi</h2>
                <p class="text-slate-500 mt-1">Sistem daxili xərclərin qeydiyyatı, idarəsi və tarixçəsi</p>
            </div>
            <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                <div class="bg-rose-100 p-3 rounded-full text-rose-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <p class="text-sm text-gray-500 font-medium">Ümumi Xərc</p>
                    <p class="text-2xl font-black text-rose-600"><span id="currentExpense">...</span> AZN</p>
                </div>
            </div>
        </div>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100">
            <h3 class="text-lg font-bold text-gray-800 mb-5 flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Yeni Xərc Əlavə Et
            </h3>
            <form id="expenseForm" class="flex flex-col xl:flex-row gap-4">
                <input type="text" id="expenseDesc" placeholder="Məzmun (Məs: Server ödənişi)" required class="flex-[2] bg-slate-50 border border-gray-200 rounded-xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors">
                
                <input type="number" id="expenseInput" placeholder="Məbləğ (AZN)" required class="flex-1 bg-slate-50 border border-gray-200 rounded-xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors">
                
                <input type="datetime-local" id="expenseDate" title="Xərcin tarixini seçin (Boş qoysanız indiki vaxt yazılacaq)" class="flex-1 bg-slate-50 border border-gray-200 rounded-xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors text-slate-600">
                
                <button type="submit" class="bg-indigo-600 text-white px-8 py-3.5 rounded-xl hover:bg-indigo-700 transition font-bold shadow-lg shadow-indigo-200 whitespace-nowrap">
                    Əlavə et
                </button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex-1">
            <h3 class="text-lg font-bold text-gray-800 mb-5 border-b border-gray-100 pb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                Xərclər Tarixçəsi
            </h3>
            
            <div id="expensesListContainer" class="flex flex-col gap-3">
                <p class="text-gray-400 text-sm">Yüklənir...</p>
            </div>
        </div>
        
    </main>

    <script src="app.js"></script>
</body>
</html>
